server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/ainovel?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&createDatabaseIfNotExist=true
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver

  ai:
    openai:
      base-url: https://api.deepseek.com
      api-key: ${DEEPSEEK_API_KEY:sk-placeholder}
      chat:
        options:
          model: deepseek-chat
          temperature: 0.7
          max-tokens: 4096

mybatis-plus:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.ainovel.backend.model.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

logging:
  level:
    com.ainovel: debug
